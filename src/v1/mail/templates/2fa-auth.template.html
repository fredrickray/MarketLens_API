<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Your verification code</title></head>
<body style="margin:0;padding:0;background-color:#FAFAF9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#FAFAF9;">
    <tr><td align="center" style="padding:40px 16px;">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;">
        <tr><td align="center" style="padding-bottom:24px;">
          <span style="font-size:22px;font-weight:600;color:#141A24;">MarketLens AI</span>
        </td></tr>
        <tr><td style="background:#FFF;border:1px solid #E8EAED;border-radius:12px;padding:40px 32px;text-align:center;">
          <h1 style="margin:0 0 12px;font-size:24px;font-weight:700;color:#141A24;">Your verification code</h1>
          <p style="margin:0 0 24px;font-size:16px;color:#6B7280;">Enter this code to complete sign-in. It expires in <strong>10 minutes</strong>.</p>
          <p style="margin:0 0 24px;font-size:36px;font-weight:700;letter-spacing:8px;color:#249B8A;font-family:ui-monospace,monospace;">{{otp_code}}</p>
          <p style="margin:0;font-size:14px;color:#6B7280;">Never share this code. MarketLens AI will never ask for it by phone or email.</p>
        </td></tr>
        <tr><td style="padding:24px 8px 0;text-align:center;"><p style="margin:0;font-size:11px;color:#9CA3AF;">&copy; {{year}} MarketLens AI</p></td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
